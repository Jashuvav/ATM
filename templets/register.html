<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#072c66,#0d47a1 45%,#2e6cc5);
}

/* Card */
.container{
    width:420px;
    padding:40px;
    background:linear-gradient(160deg,#ffffff,#eef5ff);
    border:1px solid #d6e3fb;
    border-radius:18px;
    box-shadow:0 22px 46px rgba(6,28,70,0.32);
    color:#0f172a;
}

/* Heading */
h2{
    text-align:center;
    font-size:30px;
    font-weight:600;
    margin-bottom:30px;
    color:#0d47a1;
}

/* Input Groups */
.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-size:15px;
    font-weight:500;
}

/* Inputs */
input{
    width:100%;
    padding:14px 16px;
    background:#f8fbff;
    border:1px solid #bfd2f4;
    border-radius:10px;
    font-size:15px;
    color:#1f2937;
    transition:.3s;
}

input::placeholder{
    color:#94a3b8;
}

input:focus{
    outline:none;
    border-color:#0d47a1;
    box-shadow:0 0 0 4px rgba(13,71,161,.16);
}

/* Register Button */
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#0d47a1;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0a3d8f;
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(13,71,161,.3);
}

button:active{
    transform:translateY(0);
}
</style>
</head>

<body>

<div class="container">
    <h2>User Registration</h2>

    <form method="POST" action="{{ url_for('register') }}">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmpassword" placeholder="Confirm password" required> 
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="Enter phone number" required>
        </div>

        <button type="submit">Register</button>
    </form>

</div>

</body>
</html>
